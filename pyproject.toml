# Minimal pyproject.toml - exists solely to configure pytest collection.
# Without this, pytest auto-discovers `samples/migration_demo/test_source_py2.py`,
# which is the *unmigrated Py2 fixture* the demo migrates - it's supposed to
# fail on Python 3 by design and should never be part of the project's own
# test run.
[tool.pytest.ini_options]
testpaths = ["tests"]
